name: Deploy tiles to R2

# The web app deploys via Cloudflare Pages' own Git integration. The route tiles
# don't — they live in an R2 bucket (served over HTTP range requests), so they
# need their own upload step. This runs ONLY when the committed tile file
# changes (a data refresh), not on every code push, so ordinary commits don't
# re-upload the ~16 MB archive. See docs/r2-range-requests-plan.md.
#
# Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN   — token scoped to "Workers R2 Storage: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — the account id

on:
  push:
    branches: [main]
    paths:
      - "web/public/tiles/routes.pmtiles"
  workflow_dispatch: {}

# Least privilege: this job only reads the repo to grab the committed tile file;
# the R2 write happens through CLOUDFLARE_API_TOKEN, not the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    # Only ever run against main — keeps the R2-write token off any other ref,
    # including manual workflow_dispatch runs from a branch.
    if: github.ref == 'refs/heads/main'
    steps:
      # Actions pinned to commit SHAs (not mutable tags) so a retag can't swap
      # the code that runs with our R2 credentials.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Upload routes.pmtiles to R2
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler 4.x: the action defaults to 3.90.0, where R2 uploads
          # hit the remote bucket by default and `--remote` is not a valid flag.
          # In 4.x local is the default, so `--remote` (below) is required.
          wranglerVersion: "4.105.0"
          command: >-
            r2 object put ca-mvum-tiles/routes.pmtiles
            --file web/public/tiles/routes.pmtiles
            --content-type application/octet-stream
            --remote
