<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="California MVUM">
  <!-- Cartographic mark: a winding trail/route on brand purple. Designed to read
       at 16px — bold stroke, rounded caps, two trailhead nodes. -->
  <rect width="32" height="32" rx="7" fill="#f7f4fb"/>
  <path d="M8 24 C 8 18, 16 18, 16 13 S 24 8, 24 8"
        fill="none" stroke="#6d1bb5" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="8" cy="24" r="2.7" fill="#6d1bb5"/>
  <circle cx="24" cy="8" r="2.7" fill="#6d1bb5"/>
</svg>
